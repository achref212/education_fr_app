name: education_fr_app
description: "Education FR — Application mobile pour les étudiants (Clean Architecture)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Functional error handling
  dartz: ^0.10.1

  # HTTP client
  dio: ^5.7.0

  # Dependency injection
  get_it: ^8.0.3

  # Immutable classes & code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Local cache (progress)
  shared_preferences: ^2.3.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
